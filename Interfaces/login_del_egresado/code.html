<body class="bg-surface-container-lowest min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased p-md md:p-xl">
<main class="w-full max-w-md mx-auto">
<!-- Header Section -->
<header class="mb-lg text-center">
<h1 class="font-headline-md text-headline-md md:font-display-lg md:text-display-lg text-primary mb-md">Graduation Portal</h1>
<p class="font-body-lg text-body-lg text-secondary">Ingresa tus datos para registrar a tus invitados</p>
</header>
<!-- Form Section -->
<form class="space-y-md bg-surface-container-lowest p-md md:p-lg border border-surface-variant rounded-xl shadow-sm">
<!-- DNI Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="dni">DNI</label>
<input aria-label="Documento Nacional de Identidad" class="w-full h-12 px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow duration-200" id="dni" name="dni" placeholder="Ingresa tu DNI" required="" type="text"/>
</div>
<!-- Nombres Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="nombres">Nombres</label>
<input aria-label="Nombres" class="w-full h-12 px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow duration-200" id="nombres" name="nombres" placeholder="Tus nombres" required="" type="text"/>
</div>
<!-- Apellidos Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="apellidos">Apellidos</label>
<input aria-label="Apellidos" class="w-full h-12 px-sm border border-outline-variant rounded bg-surface-container-lowest text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow duration-200" id="apellidos" name="apellidos" placeholder="Tus apellidos" required="" type="text"/>
</div>
<!-- Submit Button -->
<button class="w-full mt-lg h-12 bg-primary-container text-on-primary rounded font-label-md text-label-md flex items-center justify-center hover:bg-primary transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary" type="submit">
                Ingresar
            </button>
</form>
<!-- Optional Help Link -->
<div class="mt-md text-center">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors duration-200" href="#">¿Necesitas ayuda?</a>
</div>
